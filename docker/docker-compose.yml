version: '3.8'

services:
  ollama-web:
    build:
      context: ../src/backend
      dockerfile: ../../docker/Dockerfile.backend
    container_name: ollama-web-backend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ${VIDEO_DIR:-./data/videos}:/root/videos
      - ${IMAGE_DIR:-./data/images}:/root/images
      - ${DATABASE_DIR:-./data/database}:/root/ollama-web/backend
      - ./logs:/root/ollama-web/logs
    environment:
      - VIDEO_DIR=/root/videos
      - IMAGE_DIR=/root/images
      - DB_PATH=/root/ollama-web/backend/queue.db
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-3}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
      - ENABLE_AUTH=${ENABLE_AUTH:-false}
      - API_KEY=${API_KEY:-ollama-web-secret-key-change-in-production}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-runway/gen2-lite}
    networks:
      - ollama-network
    depends_on:
      - caddy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2.8-alpine
    container_name: ollama-web-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ollama-network
    depends_on:
      - ollama-web

networks:
  ollama-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
