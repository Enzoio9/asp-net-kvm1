# Nginx Configuration for Ollama Web API - dicabr.com.br
# This file contains the complete nginx configuration

# Main nginx.conf settings (add to /etc/nginx/nginx.conf if needed)
http {
    # Increase buffer size for large requests (video uploads)
    client_max_body_size 500M;
    
    # Timeouts for long-running operations
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    # Buffering settings
    proxy_buffering off;
    proxy_request_buffering off;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;
    
    include /etc/nginx/conf.d/*.conf;
}

# Site configuration (save as /etc/nginx/sites-available/dicabr.com.br)
server {
    listen 80;
    server_name dicabr.com.br www.dicabr.com.br;
    
    # Logging
    access_log /var/log/nginx/dicabr_access.log;
    error_log /var/log/nginx/dicabr_error.log;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Main application proxy
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Buffering disabled for streaming
        proxy_buffering off;
        proxy_cache off;
        
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # API endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Large request body support (for image uploads)
        client_max_body_size 500M;
        proxy_request_buffering off;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # Swagger docs
    location /docs {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /swagger/ {
        proxy_pass http://127.0.0.1:8080/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    # Static files - Videos (direct serving from nginx)
    location /videos/ {
        alias /var/www/dicabr.com.br/data/videos/;
        
        # Enable direct file serving
        try_files $uri $uri/ =404;
        
        # Video streaming support
        add_header Accept-Ranges bytes;
        add_header Content-Type video/mp4;
        
        # Caching
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # Static files - Images (direct serving from nginx)
    location /images/ {
        alias /var/www/dicabr.com.br/data/images/;
        
        # Enable direct file serving
        try_files $uri $uri/ =404;
        
        # Image caching
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

